name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Native Ubuntu LTS runners.
  ubuntu:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install zsh, zoxide, starship
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh zoxide curl ca-certificates tar
          # starship is not packaged; fetch the prebuilt binary (runners are x86_64)
          curl -fsSL https://github.com/starship/starship/releases/latest/download/starship-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin starship
          zsh --version && zoxide --version && starship --version
      - name: Run test suite
        run: zsh tests/run.sh

  # macOS on Apple Silicon (/opt/homebrew). Exercises the macOS fzf/MANPAGER
  # branches. Intel (macos-13) is omitted: those runners are scarce/being
  # retired and the only Intel-specific code is the /usr/local fzf path.
  macos:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install tools (Homebrew)
        run: |
          set -euo pipefail
          brew install zoxide starship fzf bat fd eza lf
          zsh --version && zoxide --version && starship --version
      - name: Run test suite
        run: zsh tests/run.sh

  # Distros without a hosted runner, exercised via Docker on an Ubuntu host.
  container:
    name: tests (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ["ubuntu:26.04", "archlinux:latest"]
    steps:
      - uses: actions/checkout@v5
      - name: Run suite in ${{ matrix.image }}
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/cfg:ro "$IMAGE" sh -c '
            set -e
            if command -v apt-get >/dev/null; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq zsh zoxide fzf curl ca-certificates tar >/dev/null
              curl -fsSL https://github.com/starship/starship/releases/latest/download/starship-x86_64-unknown-linux-gnu.tar.gz \
                | tar xz -C /usr/local/bin starship
            else
              pacman -Sy --noconfirm zsh zoxide starship fzf >/dev/null
            fi
            cd /cfg && zsh tests/run.sh
          '
