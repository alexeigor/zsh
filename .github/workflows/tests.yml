name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  native:
    name: tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh, zoxide, starship
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh zoxide curl ca-certificates tar
          # starship is not packaged; fetch the prebuilt binary (runners are x86_64)
          curl -fsSL https://github.com/starship/starship/releases/latest/download/starship-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin starship
          zsh --version && zoxide --version && starship --version

      - name: Run test suite
        run: zsh tests/run.sh

  container:
    name: tests (ubuntu:26.04 container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run suite inside ubuntu:26.04
        run: |
          docker run --rm -v "$PWD":/cfg:ro ubuntu:26.04 bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq zsh zoxide curl ca-certificates tar >/dev/null
            curl -fsSL https://github.com/starship/starship/releases/latest/download/starship-x86_64-unknown-linux-gnu.tar.gz \
              | tar xz -C /usr/local/bin starship
            cd /cfg && zsh tests/run.sh
          '
